name: Release

# Per-package releases. Tag a package with "<package>-v<version>", e.g.
#   metadata-mangabaka-v1.0.0
#   sync-anilist-v1.4.0
on:
  push:
    tags:
      - "*-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Derive the package directory from the tag: "<package>-v<version>".
      - name: Resolve package from tag
        run: |
          PKG="${GITHUB_REF_NAME%-v*}"
          if [ ! -d "packages/$PKG" ]; then
            echo "::error::No package directory packages/$PKG for tag $GITHUB_REF_NAME"
            exit 1
          fi
          echo "PKG=$PKG" >> "$GITHUB_ENV"
      # Lint, typecheck and test the whole workspace before publishing anything.
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      # npm pack runs the package's `prepare` (esbuild build) and produces a
      # self-contained, installable tarball — no npm registry needed to consume.
      - name: Pack installable tarball
        run: echo "TARBALL=$(npm pack --workspace "packages/$PKG" | tail -1)" >> "$GITHUB_ENV"
      - name: Create GitHub Release with the tarball
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "$TARBALL" --generate-notes --title "$GITHUB_REF_NAME"
