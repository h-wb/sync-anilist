name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      # npm pack runs `prepare` (esbuild build) and produces a self-contained,
      # installable tarball — no git or npm registry needed to consume it.
      - name: Pack installable tarball
        run: echo "TARBALL=$(npm pack | tail -1)" >> "$GITHUB_ENV"
      - name: Create GitHub Release with the tarball
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "$TARBALL" --generate-notes --title "$GITHUB_REF_NAME"
